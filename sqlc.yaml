version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/infrastructure/postgres/migrations"  # UP migrations are the schema source of truth
    queries: "internal/infrastructure/postgres/query"       # hand-written SQL, one file per aggregate
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/postgres/sqlc"
        sql_package: "pgx/v5"                # pgx-native execution (pgxpool / pgx.Tx satisfy the DBTX interface)
        emit_interface: true                 # Querier interface, for substitutability/testing
        emit_pointers_for_null_types: true   # nullable columns become Go pointers, not sql.Null* wrappers
        overrides:
          # Keep tally-up's native google/uuid ergonomics instead of pgtype.UUID (ADR: sqlc adoption).
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
